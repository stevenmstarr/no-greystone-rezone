<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Preserve Greystone Community</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">Greystone Community</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <h1>Contact Us</h1>
    <p>Questions, ideas, or volunteer interest? Send us a message and we’ll get back to you soon.</p>
    <form id="contact-form" class="contact-form">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Write your message here" required></textarea>

      <button type="submit" class="button">Send Message</button>
    </form>
    <p class="contact-note">You can also reach us at <a href="mailto:info@greystonecommunity.org">info@greystonecommunity.org</a>.</p>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Preserve Greystone Community.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
